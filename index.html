<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chroniques - Planificateur JDR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Share+Tech+Mono&family=Rajdhani:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0d0b0f;--surface:#16121c;--surface2:#1f1928;--border:#2e2640;--accent:#c9a84c;--accent2:#8b5cf6;--danger:#e05252;--success:#52c478;--maybe:#9ca3af;--text:#e8e0f0;--muted:#8878a8;--radius:10px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Crimson Pro',Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:17px}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 40% at 80% 10%,rgba(201,168,76,.08) 0%,transparent 60%),radial-gradient(ellipse 40% 50% at 10% 90%,rgba(139,92,246,.07) 0%,transparent 60%);pointer-events:none}
    #app{position:relative;z-index:1}
    #auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:2rem}
    .logo-title{text-align:center}
    .logo-title h1{font-family:'Cinzel',serif;font-size:clamp(2.2rem,5vw,3.5rem);font-weight:900;letter-spacing:.12em;color:var(--accent);text-shadow:0 0 40px rgba(201,168,76,.4)}
    .logo-title p{color:var(--muted);letter-spacing:.2em;font-size:.85rem;text-transform:uppercase;margin-top:.4rem}
    .ornament{color:var(--accent);opacity:.5;font-size:1.4rem}
    .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,.4)}
    .auth-tabs{display:flex;gap:.5rem;margin-bottom:2rem}
    .auth-tab{flex:1;background:none;border:1px solid var(--border);color:var(--muted);font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.12em;padding:.6rem;border-radius:6px;cursor:pointer;transition:all .2s}
    .auth-tab.active{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:600}
    .field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.2rem}
    .field label{font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
    .field input,.field select,.field textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Crimson Pro',serif;font-size:1rem;padding:.65rem .9rem;border-radius:6px;transition:border-color .2s;outline:none}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
    .field select option{background:var(--surface2)}
    .role-selector{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1.2rem}
    .role-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:1rem .5rem;cursor:pointer;transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:.4rem}
    .role-btn .role-icon{font-size:1.6rem}.role-btn .role-label{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.1em}.role-btn .role-desc{font-size:.8rem;color:var(--muted)}
    .role-btn.selected{border-color:var(--accent);color:var(--accent)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.7rem 1.4rem;border-radius:6px;font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.1em;cursor:pointer;border:none;transition:all .2s;font-weight:600}
    .btn-primary{background:var(--accent);color:var(--bg)}.btn-primary:hover{filter:brightness(1.1)}
    .btn-outline{background:none;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
    .btn-danger{background:none;border:1px solid var(--danger);color:var(--danger)}.btn-danger:hover{background:rgba(224,82,82,.12)}
    .btn-success{background:none;border:1px solid var(--success);color:var(--success)}.btn-success:hover{background:rgba(82,196,120,.12)}
    .btn-ghost{background:none;border:none;color:var(--muted);font-family:'Crimson Pro',serif;font-size:.9rem;letter-spacing:normal}.btn-ghost:hover{color:var(--text)}
    .btn-block{width:100%}.btn:disabled{opacity:.5;cursor:not-allowed;filter:none}.btn-sm{padding:.35rem .7rem;font-size:.72rem}
    .error-msg{background:rgba(224,82,82,.12);border:1px solid var(--danger);color:var(--danger);padding:.6rem .9rem;border-radius:6px;font-size:.9rem;margin-bottom:1rem}
    #main-screen{display:none;min-height:100vh;flex-direction:column}#main-screen.visible{display:flex}
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:.8rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100}
    header .logo{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--accent);letter-spacing:.1em;flex:1}
    .user-chip{display:flex;align-items:center;gap:.5rem;background:var(--surface2);border:1px solid var(--border);padding:.35rem .8rem;border-radius:20px;font-size:.85rem}
    .role-badge{font-family:'Cinzel',serif;font-size:.65rem;padding:.15rem .4rem;border-radius:4px;background:var(--accent2);color:#fff;letter-spacing:.06em}
    .role-badge.mj{background:var(--accent);color:var(--bg)}
    main{flex:1;padding:1.5rem;max-width:960px;margin:0 auto;width:100%}
    .nav-tabs{display:flex;gap:.4rem;margin-bottom:1.8rem;border-bottom:1px solid var(--border)}
    .nav-tab{background:none;border:none;border-bottom:2px solid transparent;padding:.6rem 1rem .8rem;color:var(--muted);font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.1em;cursor:pointer;transition:all .2s;margin-bottom:-1px}
    .nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .panel{display:none}.panel.active{display:block}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
    .card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;gap:1rem}
    .card-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--accent);letter-spacing:.06em}
    .card-meta{font-size:.85rem;color:var(--muted);margin-top:.2rem}
    .card-actions{display:flex;gap:.5rem;flex-shrink:0;flex-wrap:wrap}
    .code-badge{display:inline-flex;align-items:center;gap:.5rem;background:var(--surface2);border:1px dashed var(--border);border-radius:6px;padding:.35rem .8rem;font-size:.85rem}
    .code-badge strong{font-family:'Cinzel',serif;color:var(--accent);letter-spacing:.1em}
    .copy-btn{cursor:pointer;color:var(--muted);transition:color .2s;font-size:.8rem}.copy-btn:hover{color:var(--accent)}
    /* CALENDAR */
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:.8rem}
    .cal-header-cell{text-align:center;padding:.35rem 0;font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
    .cal-cell{background:var(--surface2);border:2px solid transparent;border-radius:7px;padding:.35rem .2rem .4rem;text-align:center;min-height:72px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.8rem;position:relative;transition:all .15s;cursor:default}
    .cal-cell.past{background:rgba(13,11,15,.5);opacity:.45}
    .cal-cell.has-event{border-color:var(--border);cursor:pointer}
    .cal-cell.has-event:hover{border-color:var(--accent);background:rgba(201,168,76,.05)}
    .cal-cell.selectable{cursor:pointer}
    .cal-cell.selectable:hover{border-color:var(--accent);background:rgba(201,168,76,.06)}
    .cal-cell.selected-day{border-color:var(--accent)!important;background:rgba(201,168,76,.15)!important}
    .cal-cell.already-slotted{background:rgba(201,168,76,.1)}
    .cal-cell.empty{background:transparent;border-color:transparent!important;cursor:default;min-height:72px}
    .cal-cell .day-num{font-weight:600;font-size:.78rem;color:var(--text);line-height:1.2}
    /* dot row */
    .dot-row{display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:2px;margin-top:2px;min-height:14px}
    .v-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;position:relative}
    .v-dot.vote-yes{border:none}
    .v-dot.vote-no{background:transparent!important;border-width:2px;border-style:solid}
    .v-dot.vote-maybe{border-width:2px;border-style:dashed}
    .v-dot.vote-none{background:transparent;border-width:2px;border-style:solid;opacity:.3}
    /* score */
    .cal-score{font-size:.65rem;color:var(--text);margin-top:2px;letter-spacing:.04em;font-weight:600;line-height:1}
    .cal-score .s-yes{color:#4ade80}.cal-score .s-no{color:#f87171}.cal-score .s-maybe{color:#9ca3af}
    /* event color strip */
    .ev-strip{width:100%;height:3px;border-radius:2px;margin-top:2px}
    .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem}
    .cal-month{font-family:'Cinzel',serif;font-size:1rem;color:var(--accent);letter-spacing:.08em}
    /* DATE SLOTS */
    .date-slots{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:.8rem}
    .date-slot{display:flex;align-items:center;gap:.4rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.3rem .65rem;font-size:.86rem;color:var(--text)}
    .date-slot.past-slot{opacity:.45;color:var(--muted);text-decoration:line-through}
    .date-slot.final-slot{border-color:var(--success);color:var(--success)}
    .remove-slot{cursor:pointer;color:var(--muted);font-size:.8rem;margin-left:2px}.remove-slot:hover{color:var(--danger)}
    /* PRESENCE TABLE */
    .presence-table{width:100%;border-collapse:collapse;margin-top:.8rem}
    .presence-table th,.presence-table td{padding:.5rem .55rem;text-align:center;border-bottom:1px solid var(--border);font-size:.86rem;color:var(--text)}
    .presence-table th{font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.08em;color:var(--text);text-transform:uppercase;background:var(--surface2)}
    .presence-table td:first-child{text-align:left}
    .presence-table tr:hover td{background:rgba(255,255,255,.03)}
    .s-yes{color:#4ade80}.s-no{color:#f87171}.s-maybe{color:var(--maybe)}.s-none{color:var(--muted)}
    /* RESPONSE BUTTONS */
    .response-row{display:flex;align-items:center;justify-content:space-between;padding:.7rem 0;border-bottom:1px solid var(--border);gap:1rem}
    .response-row:last-child{border-bottom:none}
    .response-btns{display:flex;gap:.4rem;margin-left:auto}
    .resp-btn{min-width:42px;height:40px;border-radius:8px;border:2px solid var(--border);background:var(--surface2);font-size:1.2rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;padding:0 .5rem}
    .resp-btn:hover{transform:scale(1.08)}
    .resp-btn.active-yes{background:rgba(74,222,128,.18);border-color:#4ade80;box-shadow:0 0 8px rgba(74,222,128,.25)}
    .resp-btn.active-no{background:rgba(248,113,113,.18);border-color:#f87171;box-shadow:0 0 8px rgba(248,113,113,.25)}
    .resp-btn.active-maybe{background:rgba(156,163,175,.18);border-color:#9ca3af;box-shadow:0 0 6px rgba(156,163,175,.2)}
    /* DATETIME ROW */
    .datetime-row{display:flex;gap:.5rem;align-items:flex-end;flex-wrap:wrap}
    .datetime-row .field{margin-bottom:0;flex:1;min-width:110px}
    /* PLAYER CHIPS */
    .player-chips{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem}
    .player-chip{display:flex;align-items:center;gap:.4rem;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:.2rem .7rem;font-size:.85rem;color:var(--text)}
    .remove-player{cursor:pointer;color:var(--muted);font-size:.75rem}.remove-player:hover{color:var(--danger)}
    /* COLOR PICKER */
    .color-picker-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem}
    .color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s}
    .color-swatch:hover,.color-swatch.selected{transform:scale(1.2);border-color:#fff}
    /* SECTION TITLE */
    .section-title{font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    /* MODAL */
    .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:1rem}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 60px rgba(0,0,0,.5);animation:modal-in .2s ease}
    @keyframes modal-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .modal-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--accent);letter-spacing:.08em;margin-bottom:1.5rem}
    .modal-footer{display:flex;gap:.8rem;justify-content:flex-end;margin-top:1.5rem;flex-wrap:wrap}
    /* TOAST */
    #toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.8rem 1.2rem;font-size:.9rem;box-shadow:0 4px 20px rgba(0,0,0,.3);transform:translateY(20px);opacity:0;transition:all .3s;pointer-events:none;color:var(--text)}
    #toast.show{transform:translateY(0);opacity:1}#toast.success{border-color:var(--success);color:var(--success)}#toast.error{border-color:var(--danger);color:var(--danger)}
    /* CLOSED BADGE */
    .closed-badge{display:inline-block;background:rgba(82,196,120,.12);border:1px solid var(--success);color:var(--success);font-size:.7rem;letter-spacing:.08em;padding:.12rem .45rem;border-radius:4px;font-family:'Cinzel',serif;margin-left:.5rem;vertical-align:middle}
    /* SEARCH */
    .search-results{background:var(--surface2);border:1px solid var(--border);border-radius:6px;margin-top:.3rem;overflow:hidden}
    .search-result-item{padding:.6rem .9rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:.9rem;color:var(--text);transition:background .15s}
    .search-result-item:hover{background:rgba(201,168,76,.08)}
    .sr-meta{font-size:.78rem;color:var(--muted)}
    /* FRIENDS */
    .friend-chip{display:flex;align-items:center;gap:.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.5rem .9rem;margin-bottom:.4rem;color:var(--text)}
    .fc-role{font-family:'Cinzel',serif;font-size:.62rem;background:var(--accent2);color:#fff;padding:.1rem .35rem;border-radius:3px}.fc-role.mj{background:var(--accent);color:var(--bg)}
    /* FINAL DATE */
    .final-date-row{display:flex;align-items:center;padding:.5rem .8rem;background:rgba(82,196,120,.07);border:1px solid var(--success);border-radius:6px;margin-bottom:.35rem;color:var(--text)}
    /* UTILS */
    .flex{display:flex}.gap-sm{gap:.5rem}.mt-sm{margin-top:.5rem}.mt-md{margin-top:1rem}
    .hidden{display:none!important}.text-muted{color:var(--muted);font-size:.9rem}
    .divider{border:none;border-top:1px solid var(--border);margin:1.2rem 0}.loading{text-align:center;color:var(--muted);padding:2rem;font-style:italic}
    /* EVENT IMAGE CARD */
    .ev-card-bg{position:relative;overflow:hidden;border-radius:var(--radius)}
    .ev-card-bg .ev-bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:0;pointer-events:none;border-radius:var(--radius)}
    .ev-card-bg .ev-card-content{position:relative;z-index:1}
    .opacity-slider{width:100%;accent-color:var(--accent);cursor:pointer;height:4px}
    .img-preview{width:100%;max-height:120px;object-fit:cover;border-radius:6px;margin-top:.5rem;border:1px solid var(--border);display:none}
    /* LEGEND */
    .cal-legend{display:flex;flex-wrap:wrap;gap:.6rem;margin-top:.8rem;font-size:.78rem;color:var(--muted)}
    .legend-item{display:flex;align-items:center;gap:.3rem}
    .legend-dot{width:10px;height:10px;border-radius:50%}
    @media(max-width:600px){header{padding:.6rem 1rem}main{padding:1rem}.calendar-grid{gap:2px}.cal-cell{min-height:58px;font-size:.7rem}.btn{padding:.55rem .9rem}}
  </style>
</head>
<body>
<div id="app">

<!-- AUTH -->
<div id="auth-screen">
  <div style="position:absolute;top:1rem;right:1rem;z-index:10">
    <div class="theme-switcher" title="Changer de theme">
      <div class="theme-btn active" data-t="default" onclick="setTheme('default')" title="Fantastique"></div>
      <div class="theme-btn" data-t="cyberpunk" onclick="setTheme('cyberpunk')" title="Cyberpunk"></div>
      <div class="theme-btn" data-t="medieval" onclick="setTheme('medieval')" title="Medieval"></div>
    </div>
  </div>
  <div class="logo-title">
    <div class="ornament">* * *</div>
    <h1>Chroniques</h1>
    <p>Planificateur de Jeux de Role</p>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Connexion</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Creer un compte</button>
    </div>
    <div id="auth-error" class="error-msg hidden"></div>
    <div id="login-form">
      <div class="field"><label>Adresse e-mail</label><input type="email" id="login-email" placeholder="votre@email.com"/></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="login-password" placeholder="......"/></div>
      <button class="btn btn-primary btn-block" onclick="doLogin()">Se connecter</button>
    </div>
    <div id="register-form" class="hidden">
      <div class="field"><label>Nom d'utilisateur</label><input type="text" id="reg-username" placeholder="Votre pseudonyme" maxlength="24"/></div>
      <div class="field"><label>Adresse e-mail</label><input type="email" id="reg-email" placeholder="votre@email.com"/></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="reg-password" placeholder="......" minlength="6"/></div>
      <div class="field"><label>Vous etes...</label></div>
      <div class="role-selector">
        <div class="role-btn" id="role-mj" onclick="selectRole('MJ')"><div class="role-icon">&#127917;</div><div class="role-label">MJ</div><div class="role-desc">Meneur de jeu</div></div>
        <div class="role-btn" id="role-jr" onclick="selectRole('JR')"><div class="role-icon">&#129497;</div><div class="role-label">Joueur</div><div class="role-desc">Participant</div></div>
      </div>
      <button class="btn btn-primary btn-block" onclick="doRegister()">Creer mon compte</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">
  <header>
    <div class="logo">&#9876; Chroniques</div>
    <div class="user-chip"><span id="header-username">-</span><span class="role-badge" id="header-role-badge">?</span></div>
    <div class="theme-switcher" title="Changer de theme">
      <div class="theme-btn active" data-t="default" onclick="setTheme('default')" title="Fantastique"></div>
      <div class="theme-btn" data-t="cyberpunk" onclick="setTheme('cyberpunk')" title="Cyberpunk"></div>
      <div class="theme-btn" data-t="medieval" onclick="setTheme('medieval')" title="Medieval"></div>
    </div>
    <button class="btn btn-ghost" onclick="doLogout()">Deconnexion</button>
  </header>
  <main>
    <div class="nav-tabs" id="nav-tabs"></div>
    <!-- PANEL CALENDRIER -->
    <div class="panel active" id="panel-calendar">
      <div class="section-title">Calendrier</div>
      <div class="cal-nav">
        <button class="btn btn-ghost" onclick="calMove(-1)">&#9664;
